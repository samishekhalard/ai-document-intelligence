version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: docintel-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:11434/api/tags"]
      interval: 15s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: docintel-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: llama3.2
      OLLAMA_EMBED_MODEL: nomic-embed-text
      DATA_DIR: /app/data
      UPLOAD_DIR: /app/data/uploads
      CHROMA_DIR: /app/data/chroma
      SQLITE_PATH: /app/data/metadata.db
    ports:
      - "8000:8000"
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

volumes:
  ollama_data:
